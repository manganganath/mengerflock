project:
  name: "tsp-lkh2"
  seed_path: "./seed/LKH-2.0.10/"
  language: "c"
  paper: "./Helsgaun2009.pdf"

modules:
  - name: "subgradient_optimization"
    files: ["SRC/Ascent.c", "SRC/CreateCandidateSet.c"]
    description: "Subgradient optimization for 1-tree lower bound and candidate edge generation"
  - name: "move_operators"
    files: ["SRC/Best2OptMove.c", "SRC/Best3OptMove.c", "SRC/Best4OptMove.c", "SRC/Best5OptMove.c", "SRC/LinKernighan.c"]
    description: "Lin-Kernighan move operators (2-opt through 5-opt and general k-opt)"
  - name: "perturbation"
    files: ["SRC/FindTour.c", "SRC/KSwapKick.c", "SRC/ChooseInitialTour.c"]
    description: "Tour construction, perturbation kicks, and initial tour strategies"

build:
  command: "cd seed/LKH-2.0.10 && make -j4"
  binary: "./seed/LKH-2.0.10/LKH"

benchmarks:
  small: ["datasets/holdout/berlin52.tsp", "datasets/holdout/eil51.tsp", "datasets/holdout/eil76.tsp", "datasets/holdout/pr76.tsp"]
  medium: ["datasets/holdout/rat195.tsp", "datasets/holdout/d198.tsp", "datasets/holdout/kroA200.tsp", "datasets/holdout/rat783.tsp", "datasets/holdout/pr1002.tsp"]
  large: ["datasets/holdout/fl1577.tsp", "datasets/holdout/d2103.tsp", "datasets/holdout/pcb3038.tsp"]

evaluation:
  metric: "gap_to_optimal"
  runs_per_instance: 5
  random_seeds: [42, 123, 456, 789, 1024]

agents:
  tool: "claude"
  strategist:
    model_flags: "--model opus"
  researchers:
    model_flags: "--model sonnet"
  wildcard:
    model_flags: "--model opus"

stopping_conditions:
  max_total_iterations: 500
  max_hours: 8
  stagnation_window: 50
