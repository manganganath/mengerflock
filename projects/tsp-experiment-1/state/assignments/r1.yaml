module_name: subgradient_optimization
files:
  - SRC/Ascent.c
  - SRC/CreateCandidateSet.c
objective: >
  Improve the quality of the lower bound and candidate set generation to help
  LKH reach optimal tours faster. The subgradient optimization uses a 1970s-era
  fixed halving schedule with hardcoded 0.7/0.3 momentum. Better Pi-values
  produce better alpha-values, which produce better candidate sets, which make
  every subsequent LK trial more effective.
constraints:
  - Do not change function signatures: Ascent(void), CreateCandidateSet(void)
  - Do not modify shared header LKH.h (request changes via strategist)
  - Must compile cleanly with existing Makefile
  - Do not break the Pi-value interface consumed by move operators
context: |
  The Ascent function computes the Held-Karp 1-tree lower bound via subgradient
  optimization. Key weaknesses to explore:

  1. **Polyak step size**: Replace the halving schedule (line 93-94) with
     T = (BestKnownUB - W) / Norm, where BestKnownUB is the best tour cost.
     This converges faster when a good upper bound is available. You can use
     BestCost or Optimum as the upper bound if available.

  2. **Adaptive momentum**: The hardcoded 0.7/0.3 split (line 105:
     `t->Pi += T * (7 * t->V + 3 * t->LastV) / 10`) could be adaptive.
     Track oscillation of V-values; increase damping when oscillating,
     increase responsiveness when monotonic.

  3. **Per-node adaptive step size**: Instead of global T, maintain per-node
     step sizes. Nodes that consistently have V(i) != 0 get larger steps.

  4. **Multiple restarts**: If subgradient stalls, perturb Pi-values and
     restart, keeping the best bound found.

  5. **Candidate set quality**: In CreateCandidateSet.c, explore adding
     edge-frequency tracking across runs, or re-running subgradient with
     warm-started Pi after finding good tours.

  PRIMARY GOAL: Reach optimality faster. Tighter bounds = better candidates =
  fewer wasted LK iterations. Measure improvement by gap_to_optimal AND
  time-to-optimal.

  STRATEGIST REDIRECT (2026-04-11T07:47): Momentum tuning variants (sign-correction,
  6/4 damping) are not productive — the original 90/10 monotone / 50/50 oscillating
  is the sweet spot. PIVOT to CreateCandidateSet.c improvements:
  - **Increase AscentCandidates for large instances**: The default may be too sparse
    for d2103 (2103 nodes). Try doubling AscentCandidates when Dimension > 1000.
  - **Warm-start Pi between runs**: After Run 1, preserve Pi-values and re-run a
    shorter subgradient to refine them using the now-known BestCost as upper bound.
  - **Add extra NN candidates for large instances**: Set ExtraCandidates=3 with
    ExtraCandidateSetType=NN automatically for Dimension > 1000.
  d2103 is the KEY remaining target. fl1577 and pcb3038 are already optimal.

  CROSS-POLLINATION from r2 (2026-04-11): r2 found that iterating Gain23
  (non-sequential moves) in a loop until no improvement dramatically cuts gaps
  on large instances — pcb3038 went from 0.043% to 0.000%. This means the LK
  search was previously leaving non-sequential improvements on the table. Better
  candidate sets from YOUR module could enable even more effective Gain23
  iterations by ensuring the right edges are available. Focus on candidate set
  quality for large instances (1500+ nodes) — this is where the remaining gaps
  are (fl1577, d2103).
