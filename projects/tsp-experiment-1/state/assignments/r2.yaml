module_name: move_operators
files:
  - SRC/Best2OptMove.c
  - SRC/Best3OptMove.c
  - SRC/Best4OptMove.c
  - SRC/Best5OptMove.c
  - SRC/LinKernighan.c
objective: >
  Improve LK local search effectiveness so each trial finds better tours faster.
  The current implementation uses FIFO active node selection and fixed-depth
  moves. Focus on reaching optimality in minimum wall-clock time. Also explore
  GA recombination parameters in the main loop.
constraints:
  - Do not change function signatures for BestXOptMove or LinKernighan
  - Do not modify shared header LKH.h (request changes via strategist)
  - Must compile cleanly with existing Makefile
  - Move operators must remain compatible with the Segment/SSegment data structures
context: |
  LinKernighan.c is the core local search. Key improvement areas:

  1. **Priority-based active node selection**: Replace FIFO with a priority queue
     ordered by C(t1, Suc(t1)) - t1->Cost (gap between current edge and best
     candidate). Nodes with largest gap are most likely to yield improvements.
     This focuses computation where it matters most.

  2. **Tighter gain-bound pruning in 3-5-opt**: At each nesting level, compute
     a bound on maximum possible remaining gain using nearest candidate cost.
     If G_current + best_possible_remaining < 0, prune immediately. This reduces
     wasted computation in deep moves.

  3. **Iterative Gain23**: Currently Gain23 (non-sequential moves) is tried once
     per pass. Allow multiple Gain23 passes — each improvement may unlock new
     sequential improvements at nearby nodes.

  4. **Time-adaptive move depth**: Track fraction of time in 4/5-opt vs
     improvements found. If the ratio is poor, temporarily reduce MaxSwaps to
     speed up remaining trials.

  5. **Or-opt prioritization**: 3-opt includes Or-opt (moving segments of 1-3
     nodes). Detect and prioritize these patterns since they're computationally
     cheap and frequently improving.

  6. **GA parameters**: Explore POPULATION_SIZE, crossover type (GPX2 vs IPT vs
     CLARIST), and replacement strategies. GPX2 crossover preserves more
     structural information. Consider increasing population for better diversity.

  PRIMARY GOAL: Reach optimality in minimum time. Better move selection =
  fewer iterations to reach optimal = faster convergence.

  STRATEGIST UPDATE (2026-04-11): Pruning approaches (tighter gain bounds in
  3-5-opt) are not productive — existing checks already handle most cases.
  REDIRECT: Focus on these higher-impact directions:
  - **GA/population tuning**: The current single-solution mode doesn't use GA.
    Try enabling population (GPX2 crossover, pop_size 10-50) for large instances.
    Diverse population + crossover could help d2103 (our hardest remaining target).
  - **Expensive-edge-first in X2 loop**: Your current attempt. If it works, great.
  - **Candidate set enrichment during search**: Add edges from diverse local
    optima to candidate sets between trials.
  - **Backbone-guided restricted search**: After BackboneTrials, focus moves on
    non-backbone edges to find remaining improvements faster.
  d2103 is the KEY remaining target (0.01-0.10% gap). fl1577 and pcb3038 are
  already reaching optimal with current main.
