module_name: post_processing
files: ["seed/solver.py"]
objective: >
  Add local search post-processing after the initial packing to reduce bin count.
  Focus on bin elimination (redistribute items from least-full bins) and item
  swap/relocation between bins.
constraints:
  - Must read the same input format (n_items, capacity, items)
  - Must output a single integer (number of bins) to stdout
  - Must complete within 30 seconds per instance (up to 600 items)
  - Do not change the initial packing strategy — r1 handles that
  - Start from the FFD result, then apply post-processing
context: >
  The current solver does pure FFD with no post-processing. After FFD, many
  bins have leftover capacity that could absorb items from other bins.
  Bin elimination: take the least-full bin, try redistributing its items to
  other bins via best-fit. If successful, one bin is saved. Repeat.
  Item swaps: for each pair of bins, try moving items between them to free space.
  Items range 20-80, capacity=100, so bins hold 2-5 items — local search is cheap.
  The post-processing should be a separate function called after FFD, so it
  composes cleanly with r1's initial packing improvements.
