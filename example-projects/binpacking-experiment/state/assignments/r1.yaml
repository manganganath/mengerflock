module_name: initial_packing
files: ["seed/solver.py"]
objective: >
  Replace the FFD initial packing with a better strategy that uses fewer bins.
  Start with Best Fit Decreasing (BFD), then explore Minimum Bin Slack (MBS)
  which fills each bin via subset-sum to minimize wasted space.
constraints:
  - Must read the same input format (n_items, capacity, items)
  - Must output a single integer (number of bins) to stdout
  - Must complete within 30 seconds per instance (up to 600 items)
  - Do not add post-processing/local search — r2 handles that
context: >
  The current solver is pure FFD: sort descending, first-fit placement.
  Items range 20-80, capacity=100, so bins hold 2-5 items.
  FFD is 29 bins over the lower bound across 13 holdout instances.
  BFD (best-fit instead of first-fit) is a trivial change that may save 1-2 bins.
  MBS fills each bin optimally via subset-sum — with max 5 items/bin, brute-force
  combinations (itertools.combinations up to length 5) is fast.
  Keep the main() function signature and I/O format unchanged.
